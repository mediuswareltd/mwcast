services:
  # Database (PostgreSQL)
  db:
      image: postgres:16-alpine
      container_name: mwcast-db
      restart: always
      environment:
        POSTGRES_USER: ${POSTGRES_USER:-mwcast}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mwcast}
        POSTGRES_DB: ${POSTGRES_DB:-mwcast}
      volumes:
        - ./data/postgres:/var/lib/postgresql/data
      ports:
        - "${POSTGRES_PORT:-5432}:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mwcast} -d ${POSTGRES_DB:-mwcast}"]
        interval: 5s
        timeout: 5s
        retries: 5

  # Message Queue (Kafka — KRaft mode, no Zookeeper needed)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mwcast-kafka
    restart: always
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 10485760
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "29092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Media Server (MediaMTX)
  media-server:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mwcast-media-server
    restart: always
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    ports:
      - "${MEDIA_RTMP_PORT:-1935}:1935"
      - "8554:8554"
      - "${MEDIA_HLS_PORT:-8888}:8888"
      - "${MEDIA_WEBRTC_PORT:-8889}:8889/tcp"
      - "${MEDIA_WEBRTC_PORT:-8889}:8889/udp"
      - "9997:9997"
    mem_limit: 2g
    cpus: "2.0"
      
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mwcast-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - APP_NAME=${APP_NAME:-MWCAST}
      - RUST_LOG=${RUST_LOG:-info}
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-mwcast}:${POSTGRES_PASSWORD:-mwcast}@db:5432/${POSTGRES_DB:-mwcast}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8080}
      - MEDIA_SERVER_URL=rtmp://localhost:${MEDIA_RTMP_PORT:-1935}
      - KAFKA_BROKERS=kafka:29092
    links:

      - db
      - kafka
      - media-server

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mwcast-frontend
    restart: always
    environment:
      - VITE_API_BASE_URL=/api
    ports:
      - "5173:5173"

  # Gateway (Caddy)
  gateway:
    image: caddy:latest
    container_name: mwcast-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  kafka_data:
  caddy_data:
  caddy_config:


networks:
  default:
    name: mwcast-network
