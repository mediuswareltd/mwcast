# MWCAST Media Server Configuration

# Listeners
rtmp: true
rtmpAddress: :1935

hls: true
hlsAddress: :8888
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsAllowOrigin: '*'

webrtc: true
webrtcAddress: :8889
webrtcICEUDPMuxAddress: :8889
webrtcICEHostNAT1To1IPs: [10.0.0.17]
webrtcAllowOrigin: '*'

api: true
apiAddress: :9997
apiAllowOrigin: '*'

# Authentication — allow anyone to publish, read, and use API
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api
        path:

# Paths
paths:
  all:
    # Single ffmpeg process with multiple outputs — one decode, multiple encodes.
    # Much cheaper than 5 separate ffmpeg processes firing simultaneously.
    runOnReady: >
      ffmpeg -i rtsp://localhost:8554/$MTX_PATH
      -c:a copy -c:v libx264 -preset veryfast -crf 23 -filter:v scale=1280:-2 -f rtsp rtsp://localhost:8554/${MTX_PATH}_720p
      -c:a copy -c:v libx264 -preset veryfast -crf 26 -filter:v scale=854:-2  -f rtsp rtsp://localhost:8554/${MTX_PATH}_480p
      -c:a copy -c:v libx264 -preset veryfast -crf 28 -filter:v scale=640:-2  -f rtsp rtsp://localhost:8554/${MTX_PATH}_360p
    runOnReadyRestart: false
