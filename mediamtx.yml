# MWCAST Media Server Configuration

# Listeners
rtmp: true
rtmpAddress: :1935

hls: true
hlsAddress: :8888

webrtc: true
webrtcAddress: :8889
webrtcICEUDPMuxAddress: :8889

api: true
apiAddress: :9997

# Authentication — allow anyone to publish, read, and use API
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api
        path:

# Paths
paths:
  all:
    runOnReady: >
      ffmpeg -i rtsp://localhost:8554/$MTX_PATH
      -c:a copy -c:v libx264 -preset superfast -filter:v scale=1280:-2 -f rtsp rtsp://localhost:8554/${MTX_PATH}_720p
      -c:a copy -c:v libx264 -preset superfast -filter:v scale=854:-2 -f rtsp rtsp://localhost:8554/${MTX_PATH}_480p
      -c:a copy -c:v libx264 -preset superfast -filter:v scale=640:-2 -f rtsp rtsp://localhost:8554/${MTX_PATH}_360p
      -c:a copy -c:v libx264 -preset superfast -filter:v scale=426:-2 -f rtsp rtsp://localhost:8554/${MTX_PATH}_240p
      -c:a copy -c:v libx264 -preset superfast -filter:v scale=256:-2 -f rtsp rtsp://localhost:8554/${MTX_PATH}_144p
    runOnReadyRestart: false
