# MWCAST Media Server Configuration (Standard Setup)

# Listeners
rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsPartDuration: 0s

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8889

api: yes
apiAddress: :9997

authInternalUsers:
- user: any
  pass:
  ips: []
  permissions:
  - action: publish
    path:
  - action: read
    path:
  - action: playback
    path:
  - action: api
    path:

paths:
  all:
    # Allow anyone to publish and read
    source: publisher
